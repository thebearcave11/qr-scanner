<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { margin: 0; padding: 0; background: #fff; }
    #qr-reader { width: 100%; }
  </style>
</head>
<body>
  <div id="qr-reader"></div>
  <script>
    const scanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 250 });
    scanner.render(
      function(decodedText) {
        window.parent.postMessage({ qrResult: decodedText }, '*');
        scanner.clear();
        document.getElementById('qr-reader').innerHTML = '<p style="padding:16px">✅ Scanned! Returning result...</p>';
      },
      function() {}
    );
  </script>
</body>
</html>
