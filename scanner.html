<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 16px; min-height: 100vh; }
    h3 { color: #ccc; font-family: Arial, sans-serif; font-size: 15px; margin: 12px 0; }
    #qr-reader { width: 100%; max-width: 380px; }
    #status { color: #aaa; font-family: Arial, sans-serif; font-size: 13px; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h3>Point camera at QR code</h3>
  <div id="qr-reader"></div>
  <div id="status">Initialising...</div>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    var params     = new URLSearchParams(window.location.search);
    var returnUrl  = params.get('returnUrl');   // still stored, used as postMessage target origin check

    window.addEventListener('load', function () {
      var status = document.getElementById('status');

      if (typeof Html5QrcodeScanner === 'undefined') {
        status.textContent = 'Failed to load QR library.';
        return;
      }

      try {
        var scanner = new Html5QrcodeScanner(
          'qr-reader',
          { fps: 10, qrbox: { width: 250, height: 250 } },
          false
        );

        scanner.render(
          function (decodedText) {
            status.textContent = 'Scanned! Sending to app...';

            scanner.clear().catch(function () {}).finally(function () {
              // Always postMessage to opener — most reliable cross-origin method
              if (window.opener && !window.opener.closed) {
                window.opener.postMessage({ qrResult: decodedText }, '*');
                status.textContent = 'Done! You can close this window.';
                setTimeout(function () { window.close(); }, 800);
              } else {
                // Opener gone — fall back to redirect
                if (returnUrl) {
                  window.location.href = returnUrl + '?qr=' + encodeURIComponent(decodedText);
                } else {
                  status.textContent = 'Scan complete: ' + decodedText;
                }
              }
            });
          },
          function () {}   // ignore scan errors
        );

        status.textContent = 'Camera ready — point at QR code';
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
    });
  </script>
</body>
</html>
